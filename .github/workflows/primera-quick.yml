name: PRIMERA / quick

on:
  pull_request:
    branches:
      - main
      - 'release/**'
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: primera-quick-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quick:
    name: PRIMERA quick gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run quick watchdog
        run: npm run watchdog:quick

      - name: Upload watchdog artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: primera-quick-${{ github.run_id }}
          if-no-files-found: ignore
          retention-days: 14
          path: |
            megalog/outputs/watchdog_quick.json
            megalog/outputs/eslint.json
