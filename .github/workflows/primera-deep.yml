name: PRIMERA / deep

on:
  pull_request:
    branches:
      - main
      - 'release/**'
  push:
    branches:
      - main
      - 'release/**'
  workflow_dispatch:

concurrency:
  group: primera-deep-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deep:
    name: PRIMERA deep gate
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run deep watchdog
        run: npm run watchdog:deep

      - name: Upload watchdog artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: primera-deep-${{ github.run_id }}
          if-no-files-found: ignore
          retention-days: 14
          path: |
            megalog/outputs/**
            megalog/lint_report.json
            megalog/lint_report.md
            diagnostics/**
